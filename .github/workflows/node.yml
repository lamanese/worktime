name: node

# Frontend-Gate (worktime#405/#21). ESLint + Produktions-Build muessen gruen
# sein, bevor gemergt wird — ein gebrochener Build oder Lint-Fehler ist genau
# der Regressionsvektor, den 0.12.0 gezeigt hat.

on:
  push:
    branches: [main, develop]
  # Laeuft auf ALLEN PRs (kein paths-Filter): als Required-Status-Check muss der
  # Workflow immer melden, sonst blockiert ein nie-startender Check den Merge.
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Frontend-Unit-Tests (Rolle×Route-Matrix, 0.12.0-Schutz)
        run: npm test

      - name: Produktions-Build
        run: npm run build
