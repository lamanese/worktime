name: node

# Frontend-Gate (worktime#405/#21). ESLint + Produktions-Build muessen gruen
# sein, bevor gemergt wird — ein gebrochener Build oder Lint-Fehler ist genau
# der Regressionsvektor, den 0.12.0 gezeigt hat.

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'webpack.config.js'
      - '.github/workflows/node.yml'

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Produktions-Build
        run: npm run build
