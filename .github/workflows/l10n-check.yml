name: l10n consistency

# Waechter gegen Katalog-Drift (worktime#259). Stellt sicher, dass die
# Uebersetzungskataloge in l10n/ exakt zu den t()/->t()-Aufrufen im Code
# passen (keine fehlenden/toten Keys, .js == .json).

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'src/**'
      - 'lib/**'
      - 'templates/**'
      - 'appinfo/**'
      - 'l10n/**'
      - 'scripts/l10n-check.mjs'

jobs:
  l10n-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: l10n-Kataloge gegen Code pruefen
        run: node scripts/l10n-check.mjs
