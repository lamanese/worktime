name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Volle Historie: Claude berechnet Diffs via base...HEAD und braucht
          # den Base-Branch + Merge-Base (sonst "no merge base" auf flachem Clone).
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          # WICHTIG: System-Prompt als env var, NICHT in claude_args --system-prompt.
          # --system-prompt in claude_args bricht das --allowedTools Parsing.
          APPEND_SYSTEM_PROMPT: |
            ARBEITSREGELN - Befolge diese IMMER:

            ## 1. ANALYSE
            Lies das Issue KOMPLETT. Verstehe Kontext, Anforderungen, Akzeptanzkriterien.
            Lies relevante Code-Dateien. Erstelle einen kurzen Plan.

            ## 2. BRANCH
            Erstelle SOFORT einen Feature-Branch: feat/issue-{nummer}-{kurzbeschreibung}

            ## 3. INKREMENTELL COMMITTEN
            Nach JEDER abgeschlossenen Teilaufgabe (z.B. ein Model, ein Endpoint, eine Komponente):
              git add (dateien) und git commit -m "feat(scope): beschreibung" und git push
            NIEMALS laenger als 5-10 Minuten arbeiten ohne zu committen und pushen!
            Deine Arbeit geht verloren wenn du nicht pushst.

            ## 4. DRAFT-PR ERSTELLEN
            Erstelle einen Draft-PR sobald der erste Commit gepusht ist.
            WICHTIG: Verknuepfe IMMER das ausloesende Issue im PR-Body mit "Closes #<issue-nummer>",
            damit das Issue beim Merge automatisch geschlossen wird.
              gh pr create --draft --title "feat(scope): beschreibung" --body "Closes #<issue-nummer>

              ## Beschreibung
              ..."
            Aktualisiere den PR-Body mit Fortschritt, behalte dabei immer die "Closes #..." Zeile.

            ## 5. VOLLSTAENDIG IMPLEMENTIEREN
            Arbeite bis das Issue KOMPLETT umgesetzt ist.
            Am Ende: Linting, Type-Checks und Tests ausfuehren.

            ## 6. PR READY SETZEN
            Wenn alles fertig und geprueft ist:
              gh pr ready
            Das triggert automatisch ein Code-Review durch Claude.

            ## 7. BEI PROBLEMEN
            Wenn etwas fehlschlaegt: committe und pushe was du hast.
            Dokumentiere offene Punkte im PR-Body.
            Erstelle den PR trotzdem - lieber unvollstaendig als verloren.
        with:
          # Auth: OAuth Token bevorzugt (claude_code_oauth_token).
          # Alternative: anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          additional_permissions: |
            actions: read
          # WICHTIG: allowedTools als separate quoted Argumente, NICHT als ein String.
          # Falsch: --allowedTools "Edit,Bash(git add:*),Bash(git commit:*)"
          # Richtig: --allowedTools "Edit,MultiEdit,..." "Bash(git add:*)" "Bash(git commit:*)"
          claude_args: |
            --max-turns 200
            --allowedTools "Edit,MultiEdit,Glob,Grep,LS,Read,Write,mcp__github_comment__update_claude_comment" "Bash(git add:*)" "Bash(git commit:*)" "Bash(git push:*)" "Bash(git status:*)" "Bash(git diff:*)" "Bash(git log:*)" "Bash(git rm:*)" "Bash(git checkout:*)" "Bash(git branch:*)" "Bash(gh pr create:*)" "Bash(gh pr ready:*)" "Bash(gh pr edit:*)" "Bash(gh pr view:*)" "Bash(gh issue view:*)" "Bash(npm run:*)" "Bash(npx:*)" "Bash(cd:*)" "Bash(ls:*)" "Bash(cat:*)" "Bash(ruff:*)" "Bash(pip:*)" "Bash(python:*)"
